<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../assets/css/creationQuestionnaire.css" />
  </head>
  <body>
    <a href="../index.html">
      <img src="../assets/img/arrowBack.png" alt="" id="arrowBack" />
    </a>
    <h1>Création du questionnaire</h1>
    <div id="form">
      <form id="form-test">
        <div class="titleProtocole">
          <h3>Nom du protocole</h3>
          <input type="text" id="title-test" name="title-test" />
        </div>

        <div id="importFile">
          <div class="inputImport">
            <h3>Importer une vidéo</h3>
            <label for="video-url" class="custom-file-upload">+</label>
            <input
              type="file"
              id="video-url"
              name="video-url"
              accept="video/*"
            />
          </div>
          <div class="inputImport">
            <h3>Importer un audio</h3>
            <label for="audio-url" class="custom-file-upload">+</label>
            <input
              type="file"
              id="audio-url"
              name="audio-url"
              accept="audio/*"
            />
          </div>
        </div>

        <div class="blocQuestion" id="questions-video">
          <h2>Questions sur la vidéo</h2>
          <div id="container-questions-video"></div>
        </div>

        <div class="blocQuestion" id="questions-audio">
          <h2>Questions sur l'audio</h2>
          <div id="container-questions-audio"></div>
        </div>

        <div class="blocQuestion" id="question-mdls">
          <h2>Questions sur la mémoire de la source</h2>
          <div id="container-questions-mdls"></div>
        </div>
        <div>
          <h2>Questions de score exterieur</h2>
          <label for="">Score exterieur 1 : <input type="text" /></label>
          <label for="">Score exterieur 2 :<input type="text" /></label>
          <label for="">Score exterieur 3 :<input type="text" /></label>
          <label for="">Score exterieur 4 :<input type="text" /></label>
          <label for="">Score exterieur 5 :<input type="text" /></label>
          <label for="">Score exterieur 6 :<input type="text" /></label>
          <label for="">Score exterieur 7 :<input type="text" /></label>
          <label for="">Score exterieur 8 :<input type="text" /></label>
          <label for="">Score exterieur 9 :<input type="text" /></label>
          <label for="">Score exterieur 10 :<input type="text" /></label>
        </div>
        <button type="submit" id="saveJson">Enregistrer</button>
      </form>
    </div>
    <div
      id="custom-alert"
      style="
        display: none;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #ff4444;
        color: white;
        padding: 15px;
        border-radius: 5px;
        z-index: 9999;
        white-space: pre-line;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      "
    >
      <span id="alert-text"></span>
      <button
        onclick="this.parentElement.style.display = 'none'"
        style="margin-left: 15px"
      >
        OK
      </button>
    </div>

    <script
      type="module"
      src="../assets/script/FrontEnd/creationQuestionnaire.js"
    ></script>
    <script type="module" src="../assets/script/FrontEnd/renderer.js"></script>
    <script
      type="module"
      src="../assets/script/FrontEnd/createFileSurvey.js"
    ></script>
  </body>
</html>
